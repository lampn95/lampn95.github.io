<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Super Mario Bros — lampn portfolio</title>
    <meta name="description" content="A JS clone of Super Mario Bros. (NES) by Garrett Johnson (MIT). Embedded on lampn95.github.io.">
    <meta name="viewport" content="width=device-width">
    <meta name="robots" content="noindex"><!-- the embedded standalone, real page is /play/mario/ -->

    <link rel="stylesheet" href="css/game.css">
    <style>
      html, body { background: #000; margin: 0; padding: 0; }
      body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
      canvas { background-color: #6b8cff; image-rendering: pixelated; max-width: 100vw; max-height: 100vh; height: auto; }
    </style>
  </head>
  <body>
    <script type="text/javascript" src="js/util.js"></script>
    <script type="text/javascript" src="js/input.js"></script>
    <script type="text/javascript" src="js/resources.js"></script>
    <script type="text/javascript" src="js/sprite.js"></script>
    <script type="text/javascript" src="js/entity.js"></script>
    <script type="text/javascript" src="js/pipe.js"></script>
    <script type="text/javascript" src="js/mushroom.js"></script>
    <script type="text/javascript" src="js/fireflower.js"></script>
    <script type="text/javascript" src="js/star.js"></script>
    <script type="text/javascript" src="js/fireball.js"></script>
    <script type="text/javascript" src="js/coin.js"></script>
    <script type="text/javascript" src="js/bcoin.js"></script>
    <script type="text/javascript" src="js/goomba.js"></script>
    <script type="text/javascript" src="js/koopa.js"></script>
    <script type="text/javascript" src="js/floor.js"></script>
    <script type="text/javascript" src="js/block.js"></script>
    <script type="text/javascript" src="js/rubble.js"></script>
    <script type="text/javascript" src="js/prop.js"></script>
    <script type="text/javascript" src="js/player.js"></script>
    <script type="text/javascript" src="js/flag.js"></script>
    <script type="text/javascript" src="js/levels/level.js"></script>
    <script type="text/javascript" src="js/levels/11.js"></script>
    <script type="text/javascript" src="js/levels/11tunnel.js"></script>
    <script type="text/javascript" src="js/game.js"></script>

    <!-- Patches added on top of the upstream game.js, without touching it: -->
    <script>
      (function () {
        // ─── 1. Music autoplay-after-gesture ───────────────────────────
        // Browsers block <audio>.play() without a user gesture. Upstream
        // calls music.overworld.play() at level-load and never retries.
        var startMusic = function () {
          try {
            if (typeof music !== 'undefined' && music.overworld) {
              var p = music.overworld.play();
              if (p && p.catch) p.catch(function () {});
            }
          } catch (e) {}
          window.removeEventListener('keydown', startMusic, true);
          window.removeEventListener('pointerdown', startMusic, true);
        };
        window.addEventListener('keydown', startMusic, true);
        window.addEventListener('pointerdown', startMusic, true);

        // ─── 2. Lives system + HUD ─────────────────────────────────────
        var INITIAL_LIVES = 3;
        var parsed = parseInt(sessionStorage.getItem('marioLives'), 10);
        var lives = (isNaN(parsed) || parsed < 0) ? INITIAL_LIVES : parsed;

        var hud = document.createElement('div');
        hud.style.cssText =
          'position:fixed;top:8px;left:50%;transform:translateX(-50%);' +
          'color:#fff;font-family:ui-monospace,monospace;font-size:14px;' +
          'background:rgba(0,0,0,0.65);padding:4px 12px;border-radius:6px;' +
          'z-index:1000;pointer-events:none;text-shadow:1px 1px 0 #000;';
        document.body.appendChild(hud);
        function updateHUD() { hud.textContent = '🍄 × ' + lives; }
        updateHUD();

        function showFloating(text, color) {
          var el = document.createElement('div');
          el.textContent = text;
          el.style.cssText =
            'position:fixed;left:50%;top:32%;transform:translateX(-50%);' +
            'color:' + color + ';font-family:ui-monospace,monospace;' +
            'font-size:22px;font-weight:700;text-shadow:2px 2px 0 #000;' +
            'z-index:1001;pointer-events:none;transition:transform 1.3s ease-out,opacity 1.3s ease-out;';
          document.body.appendChild(el);
          requestAnimationFrame(function () {
            el.style.transform = 'translateX(-50%) translateY(-60px)';
            el.style.opacity = '0';
          });
          setTimeout(function () { el.remove(); }, 1400);
        }

        // ─── 3. 1-up mushroom + hidden block (injected once level loads) ─
        var injected = false;
        var setup = setInterval(function () {
          if (typeof Mario === 'undefined' || typeof player === 'undefined'
              || !Mario.Mushroom || !Mario.Block || !Mario.Level) return;
          if (player.addLife) {
            // already wired — only need to (re)inject for new level.
          } else {
            player.addLife = function () {
              lives++;
              sessionStorage.setItem('marioLives', lives);
              updateHUD();
              showFloating('+1 LIFE', '#86efac');
            };

            // OneUp = Mushroom subclass — same visuals + movement; the
            // ONLY difference is that picking it up calls addLife()
            // instead of growing Mario.
            Mario.OneUp = function (pos) { Mario.Mushroom.call(this, pos); };
            Mario.OneUp.prototype = Object.create(Mario.Mushroom.prototype);
            Mario.OneUp.prototype.constructor = Mario.OneUp;
            Mario.OneUp.prototype.isPlayerCollided = function () {
              var a = [this.pos[0] + this.hitbox[0], this.pos[1] + this.hitbox[1]];
              var b = [player.pos[0] + player.hitbox[0], player.pos[1] + player.hitbox[1]];
              if (!(a[0] > b[0] + player.hitbox[2] || a[0] + this.hitbox[2] < b[0])) {
                if (!(a[1] > b[1] + player.hitbox[3] || a[1] + this.hitbox[3] < b[1])) {
                  delete level.items[this.idx];
                  try { sounds.powerup.play(); } catch (e) {}
                  player.addLife();
                }
              }
            };

            // Hidden block — invisible until bonked from below. Same
            // collision + bonk logic as a normal Block, just no sprite
            // while `standing` is true (i.e. before being hit).
            Mario.Level.prototype.putHiddenBlock = function (x, y, item) {
              var block = new Mario.Block({
                pos: [16 * x, 16 * y],
                sprite: this.ublockSprite,
                usedSprite: this.ublockSprite,
                bounceSprite: null,
                breakable: false,
                item: item,
              });
              block.standing = true;
              var inner = block.render.bind(block);
              block.render = function (ctx, vX, vY) {
                if (this.standing) return; // hidden
                inner(ctx, vX, vY);
              };
              this.blocks[y][x] = block;
            };
          }

          // Inject the hidden 1-up at the classic SMB 1-1 location:
          // high in the air after the 4-pipe section, accessible only
          // by running-jumping while big Mario.
          if (!injected && typeof level !== 'undefined' && level.blocks
              && level.exit === 204) {
            try {
              level.putHiddenBlock(94, 5, new Mario.OneUp([94 * 16, 5 * 16]));
              injected = true;
            } catch (e) { /* level still spinning up */ }
          }
        }, 200);

        // ─── 4. Lives-aware auto-restart on death ──────────────────────
        var scheduled = false;
        var deathWatch = setInterval(function () {
          try {
            if (typeof player !== 'undefined' && player.dying && !scheduled) {
              scheduled = true;
              clearInterval(deathWatch);
              setTimeout(function () {
                lives--;
                if (lives < 0) {
                  // Game over — wipe persistence and restart with full lives.
                  sessionStorage.removeItem('marioLives');
                  showFloating('GAME OVER', '#ef4444');
                  setTimeout(function () { window.location.reload(); }, 1500);
                } else {
                  sessionStorage.setItem('marioLives', lives);
                  window.location.reload();
                }
              }, 2800);
            }
          } catch (e) {}
        }, 250);
      })();
    </script>
  </body>
</html>
